<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#0E0E0C"/>

  <!-- Head -->
  <rect x="42" y="9" width="16" height="15" fill="white"/>

  <!-- Torso -->
  <rect x="40" y="26" width="20" height="18" fill="white"/>

  <!-- Upper-left arm: shoulder → upper-left -->
  <line x1="42" y1="30" x2="14" y2="14" stroke="white" stroke-width="9" stroke-linecap="square"/>

  <!-- Upper-right arm: shoulder → upper-right -->
  <line x1="58" y1="30" x2="84" y2="15" stroke="white" stroke-width="9" stroke-linecap="square"/>

  <!-- Left mid-arm: waist → left -->
  <line x1="40" y1="38" x2="7"  y2="42" stroke="white" stroke-width="9" stroke-linecap="square"/>

  <!-- Right mid-arm: waist → right (slightly downward) -->
  <line x1="60" y1="38" x2="90" y2="48" stroke="white" stroke-width="9" stroke-linecap="square"/>

  <!-- Left leg: hip → lower-left -->
  <line x1="44" y1="44" x2="24" y2="78" stroke="white" stroke-width="9" stroke-linecap="square"/>

  <!-- Right leg: hip → lower-right -->
  <line x1="56" y1="44" x2="76" y2="74" stroke="white" stroke-width="9" stroke-linecap="square"/>
</svg>
